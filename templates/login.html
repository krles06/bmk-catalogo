<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — Catálogo BMK</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #161616;
      --border:  #2a2a2a;
      --orange:  #f97316;
      --orange-h:#ea580c;
      --text:    #f5f5f5;
      --muted:   #737373;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--orange);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg { width: 26px; height: 26px; stroke: #fff; fill: none; }
    .logo h1 { font-size: 1.1rem; font-weight: 700; }
    .logo p  { font-size: 0.82rem; color: var(--muted); }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .field input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--orange);
    }

    .error {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(239,68,68,0.08);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .error svg { width: 15px; height: 15px; flex-shrink: 0; }

    .btn-submit {
      width: 100%;
      padding: 0.8rem;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 0.25rem;
    }
    .btn-submit:hover  { background: var(--orange-h); }
    .btn-submit:active { transform: scale(0.98); }

    @media (max-width: 400px) {
      .card { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5.5" cy="17.5" r="3.5"/>
          <circle cx="18.5" cy="17.5" r="3.5"/>
          <path d="M15 6h-5l-1 7h9"/>
          <path d="M9 6l3 11"/>
          <circle cx="14" cy="6" r="1" fill="white" stroke="none"/>
        </svg>
      </div>
      <h1>Catálogo BMK</h1>
      <p>Introduce la contraseña para acceder</p>
    </div>

    {% if error %}
    <div class="error">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post">
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autofocus autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">Entrar</button>
    </form>
  </div>
</body>
</html>
