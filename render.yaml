services:
  - type: web
    name: bmk-catalogo
    env: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --worker-class gthread --threads 4 --timeout 1800 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: BICIMARKET_URL
        sync: false
