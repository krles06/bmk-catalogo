services:
  - type: web
    name: bmk-catalogo
    env: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn --workers 1 --worker-class gevent --worker-connections 10 --timeout 1800 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: BICIMARKET_URL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
